<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Drinks Orders</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand-wrap">
        <div class="brand-badge">BAR</div>
        <div>
          <h1>Drinks Orders</h1>
          <p>Tap the order when it is ready</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="resetBtn" class="btn btn-secondary" type="button">Reset</button>
        <select id="levelSelect" class="level-select" aria-label="Select level">
          <option value="1">Level 1</option>
          <option value="2">Level 2</option>
          <option value="3">Level 3</option>
          <option value="4">Level 4</option>
        </select>
      </div>
    </header>

    <section class="ribbon-panel">
      <div id="completedRibbon" class="completed-ribbon"></div>
    </section>

    <main>
      <button id="orderCard" class="order-card" type="button" aria-label="Current order">
        <div id="tickBadge" class="tick-badge">✓</div>
        <div id="columnHeader" class="column-header"></div>
        <div id="orderVisual" class="order-visual"></div>
      </button>
    </main>

    <footer class="bottom-panel">
      <button id="nextOrderBtn" class="btn btn-next" type="button" disabled>NEXT ORDER</button>
    </footer>
  </div>

  <div id="reviewModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Completed order review">
      <div class="modal-top">
        <div class="modal-title">Completed order</div>
        <button id="closeModalBtn" class="btn btn-secondary" type="button">Close</button>
      </div>
      <div id="reviewHeader" class="column-header review-header"></div>
      <div id="reviewVisual" class="order-visual review-visual"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
